name: End-2-End Testing
on:
  push:
  pull_request:
    types:
      - opened
      - labeled

jobs:
  secrets-gate:
    if: ${{ github.event.label.name == 'Run E2E tests' || github.event.action != 'labeled' }}
    runs-on: ubuntu-latest
    outputs:
      is-secret-set: ${{ steps.is-secret-set.outputs.has_briqpay_credentials }}
    steps:
      - id: is-secret-set
        env:
          BRIQPAY_CLIENT_ID: ${{ secrets.BRIQPAY_CLIENT_ID }}
          BRIQPAY_CLIENT_KEY: ${{ secrets.BRIQPAY_CLIENT_KEY }}
        if: "${{ env.BRIQPAY_CLIENT_ID != '' && env.BRIQPAY_CLIENT_KEY != '' }}"
        run: echo "has_briqpay_credentials=true" >> $GITHUB_OUTPUT

  # Remove flag used to trigger the e2e tests
  remove_flag:
    if: ${{ contains(github.event.*.labels.*.name, 'Run E2E tests') }}
    runs-on: ubuntu-latest
    steps:
      - name: Remove "Run E2E tests" label
        uses: actions/github-script@v5
        with:
          script: |
            github.rest.issues.removeLabel({
              issue_number: ${{ github.event.issue.number || github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "Run E2E tests"
            })

  e2e-tests:
    needs:
      - secrets-gate
    if: needs.secrets-gate.outputs.is-secret-set == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - PHP_VERSION: php83-fpm
            MAGENTO_VERSION: 2.4.8-p3
          - PHP_VERSION: php84-fpm
            MAGENTO_VERSION: 2.4.8-p3

    runs-on: ubuntu-latest
    env:
      PHP_VERSION: ${{ matrix.PHP_VERSION }}
      MAGENTO_VERSION: ${{ matrix.MAGENTO_VERSION }}
      BRIQPAY_CLIENT_ID: ${{ secrets.BRIQPAY_CLIENT_ID }}
      BRIQPAY_CLIENT_KEY: ${{ secrets.BRIQPAY_CLIENT_KEY }}
      HYVA_SSH_PRIVATE_KEY: ${{ secrets.HYVA_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Start the Magento container
        run: |
          # Start tunnel as first as it has some extra startup time
          docker compose -f .github/workflows/templates/docker-compose.yaml up -d --quiet-pull tunnel
          # Start the rest of the containers
          docker compose -f .github/workflows/templates/docker-compose.yaml up -d --quiet-pull
          # Get the URL from Cloudflare
          tunnelOutput=$(docker compose -f .github/workflows/templates/docker-compose.yaml logs tunnel)
          MAGENTO_URL=$(echo "$tunnelOutput" | grep -oP 'https://\S*trycloudflare\.com' | head -n 1)
          echo "Magento URL: $MAGENTO_URL"
          echo "MAGENTO_URL=$MAGENTO_URL" >> $GITHUB_ENV

      - name: Install Hyvä theme and Hyvä Checkout
        run: |
          docker exec magento-project-community-edition /bin/bash /data/install-hyva.sh

      - name: Upload the code into the docker container
        run: |
          sed -i '/version/d' ./composer.json && \
          docker cp $(pwd) magento-project-community-edition:/data/extensions/ && \
          docker exec magento-project-community-edition ./install-composer-package -W briqpay/module-payments-hyva-checkout:@dev

      - name: Activate the extension
        run: |
          docker exec magento-project-community-edition php /data/merge-config.php
          docker exec magento-project-community-edition ./retry "php bin/magento module:enable Briqpay_Payments Briqpay_PaymentsHyvaCheckout"
          docker exec magento-project-community-edition ./retry "php bin/magento setup:upgrade --no-interaction --keep-generated"
          docker exec magento-project-community-edition ./retry "php bin/magento cache:flush"

      - name: Configure Briqpay
        run: |
          docker exec magento-project-community-edition ./retry "bin/magento config:set payment/briqpay/active 1"
          docker exec magento-project-community-edition ./retry "bin/magento config:set payment/briqpay/test_mode 1"
          docker exec magento-project-community-edition ./retry "bin/magento config:set payment/briqpay/checkout_type consumer"
          docker exec magento-project-community-edition ./retry "bin/magento config:set payment/briqpay/client_id ${{ env.BRIQPAY_CLIENT_ID }}"
          docker exec magento-project-community-edition ./retry "bin/magento config:set payment/briqpay/shared_secret ${{ env.BRIQPAY_CLIENT_KEY }}"

      - name: Prepare Magento
        run: |
          sudo echo "127.0.0.1 magento.test" | sudo tee -a /etc/hosts
          docker exec magento-project-community-edition /bin/bash ./change-base-url $MAGENTO_URL/
          docker exec magento-project-community-edition ./retry "bin/magento config:set admin/security/session_lifetime 1440"
          docker exec magento-project-community-edition ./retry "bin/magento config:set web/cookie/cookie_lifetime 86400"
          docker exec magento-project-community-edition ./retry "php bin/magento setup:di:compile"
          docker exec magento-project-community-edition ./retry "php bin/magento setup:static-content:deploy -f"
          docker exec magento-project-community-edition ./retry "php bin/magento indexer:reindex"

      - name: Check if we can reach the Magento frontend
        run: |
          curl --fail-with-body -k -v -w "%{http_code}" $MAGENTO_URL/

      - name: Check if we can reach the Magento backend
        run: |
          curl --fail-with-body -k -v -w "%{http_code}" $MAGENTO_URL/admin/

      - name: Install Playwright dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run Playwright tests
        id: run_tests
        run: |
          BASE_URL="$MAGENTO_URL/" npx playwright test

      - name: Dump docker-compose logs
        if: failure()
        run: |
          docker compose -f .github/workflows/templates/docker-compose.yaml logs magento > magento.log
          docker compose -f .github/workflows/templates/docker-compose.yaml logs tunnel > tunnel.log
          docker exec magento-project-community-edition ./retry "php bin/magento app:config:dump system scopes"
          docker cp magento-project-community-edition:/data/app/etc/config.php config.php

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: E2E logs - ${{ matrix.PHP_VERSION }} - ${{ matrix.MAGENTO_VERSION }}
          path: |
            test-results
            playwright-report
            magento-logs
            magento.log
            tunnel.log
            config.php
